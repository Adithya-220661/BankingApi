<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset NetBanking PIN</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(135deg, darkblue, navy, lightblue, pink, skyblue, violet, purple);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 520px;
            background: whitesmoke;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-3px); }
        .title {
            text-align: center;
            color: #003366;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 6px;
            margin-bottom: 18px;
            font-size: 14px;
            transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: gray; outline: none; }
        button {
            padding: 11px 28px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }
        .primary { background: #003366; color: gold; }
        .primary:hover { background: lightskyblue; }
        .secondary { background: #003366; color: gold; }
        .secondary:hover { background: lightskyblue; }
        .btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .hidden { display: none; }
        .note { font-size: 12px; color: tomato; margin-bottom: 10px; }
        .captcha-box { display: flex; align-items: center; gap: 14px; }
        .captcha-box span {
            background: plum;
            padding: 8px;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .captcha-box button {
            padding: 0;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .password-box { position: relative; }
        .eye {
            position: absolute;
            right: 12px;
            top: 13px;
            cursor: pointer;
            font-size: 16px;
        }
        #timer { font-size: 13px; color: #444; margin-bottom: 10px; }
        #resendBtn { margin-top: 5px; background: #eee; }
        .success-box { text-align: center; }
        .success-box .tick { font-size: 60px; margin-bottom: 16px; }
        .success-box h3 { color: #2ecc71; font-size: 22px; margin-bottom: 8px; }
        .success-box p { color: #64748b; margin-bottom: 24px; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Reset NetBanking PIN</div>

    <!-- STEP 1 — Phone + Captcha -->
    <div id="step1">
        <label>Account Number *</label>
        <input type="text" id="account" placeholder="Enter Account Number">

        <label>Registered Mobile Number *</label>
        <input type="text" id="mobile" maxlength="10" placeholder="Enter 10-digit mobile number">

        <div class="note">Note: OTP will be sent to your registered mobile number.</div>

        <label>Captcha</label>
        <div class="captcha-box">
            <span id="captchaText"></span>
            <button type="button" onclick="generateCaptcha()">🔄</button>
            <input type="text" id="captchaInput" placeholder="Enter Captcha">
        </div>

        <div class="btns">
            <button class="primary" onclick="sendOTP()">Continue</button>
            <button class="secondary" onclick="goLogin()">Cancel</button>
        </div>
    </div>

    <!-- STEP 2 — OTP Verify -->
    <div id="step2" class="hidden">
        <label>Enter OTP sent to your mobile</label>
        <input type="text" id="otp" maxlength="6" placeholder="Enter 6-digit OTP">
        <p id="timer"></p>
        <button id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>
        <div class="btns">
            <button class="primary" onclick="verifyOTP()">Verify OTP</button>
        </div>
    </div>

    <!-- STEP 3 — New PIN -->
    <div id="step3" class="hidden">
        <label>New PIN (4 digits)</label>
        <div class="password-box">
            <input type="password" id="newpass" maxlength="4"
                   oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"
                   placeholder="Enter 4-digit PIN">
            <span class="eye" onclick="togglePassword()">👀</span>
        </div>
        <label>Confirm New PIN</label>
        <input type="password" id="confirmpass" maxlength="4"
               oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"
               placeholder="Confirm 4-digit PIN">
        <div class="btns">
            <button class="primary" onclick="resetPIN()">Reset PIN</button>
        </div>
    </div>

    <!-- SUCCESS -->
    <div id="step4" class="hidden">
        <div class="success-box">
            <div class="tick">✅</div>
            <h3>PIN Reset Successfully!</h3>
            <p>Your PIN has been updated. Please login with your new PIN.</p>
            <button class="primary" onclick="goLogin()">Go to Login</button>
        </div>
    </div>
</div>

<script>
/* ── CAPTCHA ── */
let captchaCode = "";

function generateCaptcha() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let captcha = "";
    for(let i = 0; i < 5; i++){
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    captchaCode = captcha;
    document.getElementById("captchaText").innerText = captcha;
}

function verifyCaptcha() {
    const user = document.getElementById("captchaInput").value.trim();
    if(user !== captchaCode){
        alert("❌ Wrong Captcha! Please try again.");
        generateCaptcha();
        document.getElementById("captchaInput").value = "";
        return false;
    }
    return true;
}

/* ── TIMER ── */
let timeLeft = 30;
let timerInterval = null;

function startTimer() {
    document.getElementById("resendBtn").disabled = true;
    timeLeft = 30;
    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
        document.getElementById("timer").innerText = "Resend OTP in " + timeLeft + " seconds";
        timeLeft--;
        if(timeLeft < 0){
            clearInterval(timerInterval);
            document.getElementById("resendBtn").disabled = false;
            document.getElementById("timer").innerText = "You can resend OTP now";
        }
    }, 1000);
}

/* ── STEP 1: SEND OTP ── */
async function sendOTP() {
    if(!verifyCaptcha()) return;

    const acc   = document.getElementById("account").value.trim();
    const phone = document.getElementById("mobile").value.trim();

    if(acc === "" || phone === ""){
        alert("⚠️ Enter Account Number and Mobile Number");
        return;
    }
    if(phone.length !== 10){
        alert("⚠️ Enter valid 10-digit mobile number");
        return;
    }

    try {
        const res  = await fetch('http://localhost:5000/api/auth/forgot-pin', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ phone })
        });
        const data = await res.json();

        if(data.success){
            document.getElementById("step1").style.display = "none";
            document.getElementById("step2").style.display = "block";
            startTimer();
            alert("✅ OTP sent to your registered mobile number!");
        } else {
            alert("❌ " + data.message);
        }
    } catch(err) {
        alert("❌ Backend not running! Start server first.");
    }
}

/* ── RESEND OTP ── */
async function resendOTP() {
    const phone = document.getElementById("mobile").value.trim();
    try {
        const res  = await fetch('http://localhost:5000/api/auth/forgot-pin', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ phone })
        });
        const data = await res.json();
        if(data.success){
            alert("✅ New OTP sent!");
            startTimer();
        } else {
            alert("❌ " + data.message);
        }
    } catch(err) {
        alert("❌ Backend not running!");
    }
}

/* ── STEP 2: VERIFY OTP ── */
function verifyOTP() {
    const userOTP = document.getElementById("otp").value.trim();
    if(userOTP.length !== 6){
        alert("⚠️ Please enter complete 6-digit OTP.");
        return;
    }
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
}

/* ── STEP 3: RESET PIN ── */
async function resetPIN() {
    const phone      = document.getElementById("mobile").value.trim();
    const otp        = document.getElementById("otp").value.trim();
    const newPin     = document.getElementById("newpass").value.trim();
    const confirmPin = document.getElementById("confirmpass").value.trim();

    if(!newPin || newPin.length !== 4){
        alert("⚠️ PIN must be exactly 4 digits.");
        return;
    }
    if(!/^\d{4}$/.test(newPin)){
        alert("⚠️ PIN must contain numbers only.");
        document.getElementById("newpass").value = "";
        return;
    }
    if(newPin !== confirmPin){
        alert("❌ PINs do not match! Please try again.");
        document.getElementById("confirmpass").value = "";
        return;
    }

    try {
        const res  = await fetch('http://localhost:5000/api/auth/reset-pin', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ phone, otp, newPin })
        });
        const data = await res.json();

        if(data.success){
            document.getElementById("step3").style.display = "none";
            document.getElementById("step4").style.display = "block";
        } else {
            alert("❌ " + data.message);
        }
    } catch(err) {
        alert("❌ Backend not running! Start server first.");
    }
}

/* ── SHOW/HIDE PIN ── */
function togglePassword() {
    const pass = document.getElementById("newpass");
    const eye  = document.querySelector(".eye");
    if(pass.type === "password"){
        pass.type = "text";
        eye.innerText = "🙉";
    } else {
        pass.type = "password";
        eye.innerText = "👀";
    }
}

/* ── GO TO LOGIN ── */
function goLogin() {
    window.location.href = "index.html";
}

/* ── AUTO LOGOUT ── */
let logoutTimer;
function resetTimer() {
    clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
        alert("Session expired due to inactivity");
        window.location.href = "index.html";
    }, 120000);
}
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
resetTimer();

/* ── GENERATE CAPTCHA ON LOAD ── */
window.onload = generateCaptcha;
</script>

</body>
</html>
