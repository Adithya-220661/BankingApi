<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locate Us | Horizon Bank</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0b2c4a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:#051b2d;
}

.logo{
font-size:24px;
color:#ffd700;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
padding:40px;
text-align:center;
background:linear-gradient(120deg,#0b2c4a,#145a8d);
}

/* MAP HEADER */

.map-header{
text-align:center;
font-size:24px;
margin-top:20px;
color:#ffd700;
}

/* SEARCH */

.search-box{
text-align:center;
padding:20px;
background:white;
color:black;
}

.search-box input{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:10px 14px;
border:none;
background:#0b5c9e;
color:white;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

/* TOGGLE */

.toggle{
text-align:center;
margin:15px;
}

.toggle button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
background:#ffd700;
cursor:pointer;
}

/* MAP */

#map{
height:420px;
margin:20px 40px;
border-radius:10px;
}

/* BRANCH GRID */

.branch-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:40px;
}

.branch-card{
background:white;
color:black;
padding:20px;
border-radius:10px;
transition:.3s;
}

.branch-card:hover{
transform:translateY(-6px);
}

.branch-card button{
margin-top:10px;
padding:8px 12px;
background:#0b5c9e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<nav>

<div class="logo">🌅 Horizon Bank</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Locate</a></li>
<li><a href="#">Services</a></li>
</ul>

</nav>

<section class="hero">
<h1>Find Our Branches & ATMs</h1>
<p>Locate nearest banking services easily</p>
</section>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search branch...">
<button onclick="searchBranch()">Search</button>

<button onclick="getLocation()">📍 My Location</button>

</div>

<div class="toggle">

<button onclick="showBranches()">Branches</button>
<button onclick="showATMs()">ATMs</button>
<button onclick="findNearest()">Nearest Branch</button>
<button onclick="toggleTheme()">Dark / Light</button>

</div>

<h2 class="map-header" id="mapTitle">
Select a branch to view on map
</h2>

<div id="map"></div>

<section class="branch-grid" id="branchGrid"></section>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* MAP */

var map=L.map('map').setView([16.3067,80.4365],7);

var light=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var dark=L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
);

let darkMode=false;

/* BRANCH DATA */

let branches=[

{name:"Guntur Branch",lat:16.3067,lng:80.4365,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Vijayawada Branch",lat:16.5062,lng:80.6480,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Hyderabad Branch",lat:17.4435,lng:78.3772,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Visakhapatnam Branch",lat:17.6868,lng:83.2185,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Tirupati Branch",lat:13.6288,lng:79.4192,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Warangal Branch",lat:17.9689,lng:79.5941,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Kakinada Branch",lat:16.9891,lng:82.2475,type:"branch",time:"9:30 AM - 4:00 PM"},
{name:"Nellore Branch",lat:14.4426,lng:79.9865,type:"branch",time:"9:30 AM - 4:00 PM"},

{name:"ATM Guntur",lat:16.3120,lng:80.4400,type:"atm",time:"24 Hours"},
{name:"ATM Vijayawada",lat:16.5200,lng:80.6400,type:"atm",time:"24 Hours"},
{name:"ATM Hyderabad",lat:17.4500,lng:78.3800,type:"atm",time:"24 Hours"},
{name:"ATM Vizag",lat:17.7000,lng:83.2200,type:"atm",time:"24 Hours"}

];

/* MARKERS */

let markers=[];

function loadMarkers(filter){

markers.forEach(m=>map.removeLayer(m));
markers=[];

branches.forEach(b=>{

if(!filter || b.type===filter){

let marker=L.marker([b.lat,b.lng])
.addTo(map)
.bindPopup(
"<b>"+b.name+"</b><br>Timing: "+b.time
);

markers.push(marker);

}

});

}

loadMarkers();

/* GRID CARDS */

function loadCards(){

let grid=document.getElementById("branchGrid");
grid.innerHTML="";

branches.forEach((b,i)=>{

grid.innerHTML+=`

<div class="branch-card">

<h3>${b.name}</h3>

<p>Timing: ${b.time}</p>

<button onclick="showOnMap(${i})">
View on Map
</button>

<button onclick="route(${b.lat},${b.lng})">
Directions
</button>

</div>

`;

});

}

loadCards();

/* SHOW LOCATION */

function showOnMap(i){

let b=branches[i];

map.setView([b.lat,b.lng],13);

document.getElementById("mapTitle").innerText=b.name;

L.marker([b.lat,b.lng])
.addTo(map)
.bindPopup(b.name)
.openPopup();

}

/* SEARCH */

function searchBranch(){

let input=document.getElementById("searchInput")
.value.toLowerCase();

document.querySelectorAll(".branch-card")
.forEach(card=>{

if(card.innerText.toLowerCase().includes(input))
card.style.display="block";
else
card.style.display="none";

});

}

/* BRANCH / ATM FILTER */

function showBranches(){
loadMarkers("branch");
}

function showATMs(){
loadMarkers("atm");
}

/* THEME */

function toggleTheme(){

if(darkMode){

map.removeLayer(dark);
light.addTo(map);

}else{

map.removeLayer(light);
dark.addTo(map);

}

darkMode=!darkMode;

}

/* USER LOCATION */

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

map.setView([lat,lon],12);

L.marker([lat,lon])
.addTo(map)
.bindPopup("You are here")
.openPopup();

});

}

}

/* NEAREST BRANCH */

function findNearest(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let userLat=pos.coords.latitude;
let userLon=pos.coords.longitude;

let min=9999;
let nearest=null;

branches.forEach(b=>{

if(b.type=="branch"){

let d=Math.sqrt(
Math.pow(userLat-b.lat,2)+
Math.pow(userLon-b.lng,2)
);

if(d<min){
min=d;
nearest=b;
}

}

});

if(nearest){

map.setView([nearest.lat,nearest.lng],13);

document.getElementById("mapTitle")
.innerText="Nearest: "+nearest.name;

}

});

}

}

/* ROUTE */

function route(lat,lng){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng
);

}

</script>

</body>
</html>
