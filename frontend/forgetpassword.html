
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Reset NetBanking Password</title>
    <style>



    body{
        margin:0;
        height:100vh;
        font-family:Segoe UI, Arial, sans-serif;
        background:linear-gradient(135deg,darkblue,navy,lightblue,pink,skyblue,violet,purple);
        display:flex;
        justify-content:center;
        align-items:center;
    }


    /* full box styles */

    .card{
    width:520px;
    background:whitesmoke;
    padding:40px;
    border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,0.25);
    transition:0.3s;
  
    }

    .card:hover{
    transform:translateY(-3px);
    }


    /*title name styles */

    .title{
    text-align:center;
    color:#003366;
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
    
    }


    /* LABELS */

    label{
    font-size:14px;
    font-weight:600;
    color:#1e293b;
    }


    /* INPUT BOX */

    input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:6px;
    margin-bottom:18px;
    font-size:14px;
    transition:0.3s;
    }

    input:focus{
    border-color:gray;
    box-shadow:0 0 6px rgba(55,71,0.4);
    outline:none;
    }


    /* Buttons  Styles */

    button{
    padding:11px 28px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
    transition:0.25s;
    }

    .primary{
    background:#003366;
    color:gold;
    }

    .primary:hover{
    background:lightskyblue;
    }

    .secondary{
    background:#003366;
    color: gold;

    }

    .secondary:hover{
    background:lightskyblue;
    }


    /* 2 buttons between settings  */

    .btns{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
    }


    /* hidden section  */

    .hidden{
    display:none;
    }


    /* Note */

    .note{
    font-size:12px;
    color:tomato;
    margin-bottom:10px;
    }

 




     .captcha-box{
    display:flex;
    align-items:center;
    gap:14px;
    }

    .captcha-box span{
        background:plum;
        padding:8px 8px;
        font-weight:bold;
        letter-spacing:4px;
        margin-right: 0%;
    }

    .captcha-box button{
    box-sizing: border-box;
    padding:0;
    justify-items: left;
    border:none;
    background:white;
    color:gold;
    cursor:pointer;
    border-radius:4px;
    margin-trim:left;

    }


    /* step2 password reset box */

    .password-box{
    position:relative;
    }

    .eye{
    position:absolute;
    right:12px;
    top:13px;
    cursor:pointer;
    font-size:16px;
    }


    /* STRENGTH BAR */

    progress{
    width:100%;
    height:10px;
    margin-bottom:8px;
    }


    /* TIMER */

    #timer{
    font-size:13px;
    color:#444;
    margin-bottom:10px;
    }


    /* RESEND BUTTON */

    #resendBtn{
    margin-top:5px;
    background:#eee;
    }

    </style>
</head>

<body>

<div class="card">

<div class="title">Reset NetBanking Password</div>

<!-- STEP 1 -->

<div id="step1">

<label>Account Number *</label>
<input type="text" id="account">

<label>Registered Mobile Number *</label>
<input type="text" id="mobile">
<div class="note">
Note : OTP will be sent to your registered mobile number..
</div>

<label>Captcha</label>

<div class="captcha-box">
<span id="captchaText">AB12</span>
<button type="button" onclick="generateCaptcha()">🔄</button>
<input type="text" id="captchaInput" placeholder="Enter Captcha">
</div>

<div class="btns">
<button class="primary" onclick="sendOTP()">Continue</button>
<button class="secondary" onclick="goLogin()">Cancel</button>
</div>

</div>


<!-- STEP 2 -->

<div id="step2" class="hidden">

<label>Enter OTP</label>

<input type="text" id="otp">

<p id="timer"></p>

<button id="resendBtn" onclick="resendOTP()" disabled>
Resend OTP
</button>

<div class="btns">
<button class="primary" onclick="verifyOTP()">VERIFY OTP</button>
</div>

</div>


<!-- STEP 3 -->

<div id="step3" class="hidden">

<label>New Password</label>

<div class="password-box">
<input type="password" id="newpass" onkeyup="checkStrength()">
<span class="eye" onclick="togglePassword()">👀</span>
</div>

<progress id="strengthBar" value="0" max="4"></progress>
<p id="strengthText"></p>

<label>Confirm Password</label>

<input type="password" id="confirmpass">

<div class="btns">
<button class="primary" onclick="resetPassword()">RESET PASSWORD</button>
</div>

</div>

</div>


<script>

/* OTP VARIABLES */

let otp="123456";
let attempts=0;
let maxAttempts=3;


/* CAPTCHA */

let captchaCode="";

function generateCaptcha(){

captchaCode=Math.floor(1000+Math.random()*9000);

document.getElementById("captchaText").innerText=
"CAPTCHA : "+captchaCode;

}

function verifyCaptcha(){

let user=document.getElementById("captchaInput").value;

if(user!=captchaCode)
{
alert("Wrong CAPTCHA");
return false;
}

return true;

}


/* SEND OTP */

function sendOTP(){

if(!verifyCaptcha()) return;

let acc=document.getElementById("account").value;
let mob=document.getElementById("mobile").value;

if(acc=="" || mob=="")
{
alert("Enter Account Number and Mobile Number");
return;
}

alert("OTP Sent : 123456 (Demo)");

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

startTimer();

}


/* TIMER */

let timeLeft=30;

function startTimer(){

document.getElementById("resendBtn").disabled=true;

let timer=setInterval(function(){

document.getElementById("timer").innerText=
"Resend OTP in "+timeLeft+" seconds";

timeLeft--;

if(timeLeft<0)
{
clearInterval(timer);

document.getElementById("resendBtn").disabled=false;

document.getElementById("timer").innerText=
"You can resend OTP now";

}

},1000);

}

function resendOTP(){

alert("New OTP Sent");

timeLeft=30;

startTimer();

}


/* VERIFY OTP */

function verifyOTP(){

let userOTP=document.getElementById("otp").value;

if(userOTP===otp)
{
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";
}
else
{
attempts++;

if(attempts>=maxAttempts)
{
alert("Account Locked due to 3 wrong OTP attempts");
window.location.href="index.html";
}
else
{
alert("Wrong OTP. Remaining attempts: "+(maxAttempts-attempts));
}

}

}


/* PASSWORD STRENGTH */

function checkStrength(){

let pass=document.getElementById("newpass").value;

let strength=0;

if(pass.length>=8) strength++;
if(/[A-Z]/.test(pass)) strength++;
if(/[a-z]/.test(pass)) strength++;
if(/[0-9]/.test(pass)) strength++;

document.getElementById("strengthBar").value=strength;

let text=["Weak","Fair","Good","Strong"];

document.getElementById("strengthText").innerText=
text[strength-1]||"";

}


/* PASSWORD VALIDATION */

function validatePassword(pass){

let regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}$/;

return regex.test(pass);

}


/* SHOW HIDE PASSWORD */

function togglePassword(){

let pass=document.getElementById("newpass");

pass.type = pass.type==="password" ? "text" : "password";

}


/* RESET PASSWORD */

function resetPassword(){

let p1=document.getElementById("newpass").value;
let p2=document.getElementById("confirmpass").value;

if(!validatePassword(p1))
{
alert("Password must contain:\nMinimum 8 characters\n1 Capital\n1 Small\n1 Number");
return;
}

if(p1!=p2)
{
alert("Passwords do not match");
return;
}

alert("Password Reset Successful");

window.location.href="index.html";

}


/* AUTO LOGOUT */

let logoutTimer;

function resetTimer(){

clearTimeout(logoutTimer);

logoutTimer=setTimeout(function(){

alert("Session expired due to inactivity");

window.location.href="index.html";

},120000);

}

document.onmousemove=resetTimer;
document.onkeypress=resetTimer;

resetTimer();


window.onload=generateCaptcha;


// =======================
// RANDOM CAPTCHA GENERATOR
// =======================

function generateCaptcha(){

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let captcha = "";

for(let i=0;i<5;i++){

captcha += chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("captchaText").innerText = captcha;

}



function generateCaptchaAdmin(){

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let captcha = "";

for(let i=0;i<5;i++){

captcha += chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("captchaText2").innerText = captcha;

}

document.addEventListener("DOMContentLoaded", function(){

generateCaptcha();
generateCaptchaAdmin();

});

// Card hover glow

document.querySelectorAll(".service-card").forEach(card => {

card.addEventListener("mouseenter", () => {
card.style.transform="translateY(-12px)";
});

card.addEventListener("mouseleave", () => {
card.style.transform="translateY(0)";
});

});
</script>

</body>
</html>
