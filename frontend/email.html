<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Email Support</title>

<style>
body {
    font-family: 'Segoe UI';
    background:url("css/lastbgofaccount.png");
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-size:cover;
}

/* Card */
.box {
    padding: 30px;
    width:400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    margin-left: 500px;
}

/* Heading */
h2 {
    font-size:35px;
    color:yellow;
}

/* Inputs */
input {
    width:100%;
    padding: 10px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid black;
}

/* Buttons */
.buttons {
    margin-top: 20px;
    display: flex;
    gap: 15px;
}

.buttons button {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

.reset-btn {
    background: #ddd;
}

.submit-btn {
    background: #2ec4b6;
    color: white;
}

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    right: -300px;
    background: #28a745;
    color: white;
    padding: 15px;
    border-radius: 8px;
    transition: 0.5s;
}
.toast.show {
    right: 20px;
}

.error {
    background: red !important;
}

/* CAPTCHA */
.form-row {
    display: flex;
    gap: 10px;
}

.captcha-box {
    display: flex;
    gap: 10px;
}

.captcha-box button {
    background: transparent;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.captcha-text {
    background: #0A1F44;
    color: white;
    padding: 10px;
    letter-spacing: 3px;
    font-weight: bold;
}

/* Checkbox */
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 15px 0;
    color: white;
}

.checkbox-group input {
    width: 18px;
    height: 18px;
}
</style>
</head>

<body>

<div class="box">
    <h2>📧 Email Support</h2>

    <form id="form">
        <input type="text" placeholder="Enter Name" required>
        <input type="email" placeholder="Enter Email" required>

        <div class="form-row">
            <div class="captcha-box">
                <span id="captchaText" class="captcha-text"></span>
                <button type="button" onclick="generateCaptcha()">🔄</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter Captcha" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="agree">
            <label for="agree">I agree to Terms & Conditions</label>
        </div>

        <div class="buttons">
            <button type="reset" class="reset-btn">Reset</button>
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>
</div>

<div class="toast" id="toast">✅ Email Linked Successfully!</div>

<script>

// CAPTCHA
function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let captcha = "";
    for (let i = 0; i < 4; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaText").innerText = captcha;
}
generateCaptcha();

// TOAST
function showToast(message, isError = false) {
    let toast = document.getElementById("toast");
    toast.innerText = message;

    if (isError) {
        toast.classList.add("error");
    } else {
        toast.classList.remove("error");
    }

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let captchaText = document.getElementById("captchaText").innerText;
    let captchaInput = document.getElementById("captchaInput").value;
    let agree = document.getElementById("agree").checked;

    if (captchaText !== captchaInput) {
        showToast("❌ Invalid CAPTCHA", true);
        generateCaptcha();
        return;
    }

    if (!agree) {
        showToast("⚠ Please accept Terms & Conditions", true);
        return;
    }

    // SUCCESS
    showToast("✅ Email Linked Successfully!");
    this.reset();
    generateCaptcha();

    // 🔁 REDIRECT AFTER TOAST
    setTimeout(() => {
        window.location.href = "index.html";
    }, 1000);
});

</script>

</body>
</html>
