<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard – Mini NetBank</title>
  <link rel="stylesheet" href="css/style1.css">
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle">☰</button>
  
  <div class="sidebar" id="sidebar">
    <h2>🏦 Mini NetBank</h2>
    <a href="dashboard.html" class="sidebar-link active" data-icon="📈">
      <span class="link-icon">📈</span>
      <span class="link-text">Dashboard</span>
    </a>
    <a href="transfer.html" class="sidebar-link" data-icon="💵">
      <span class="link-icon">💵</span>
      <span class="link-text">Transfer</span>
    </a>
    <a href="history.html" class="sidebar-link" data-icon="⏳">
      <span class="link-icon">⏳</span>
      <span class="link-text">Transactions</span>
    </a>
    <a href="admin.html" class="sidebar-link" id="adminLink" style="display:none">
      <span>🔐</span>
      <span>Admin</span>
    </a>
    <a href="index.html" class="sidebar-link" data-icon="🚪">
      <span class="link-icon">🚪</span>
      <span class="link-text">Logout</span>
    </a>
  </div>

  <div class="main">
    <header class="page-header">
      <h1 id="welcomeHeader">Welcome, User</h1>
      <button id="modeToggle">🌙 Dark Mode</button>
    </header>

    <section class="stats-cards" id="statsContainer">
      <!-- statistic cards inserted by JavaScript -->
    </section>

    <section class="quick-actions center">
      <a href="transfer.html" class="action-btn">Send Money</a>
      <a href="history.html" class="action-btn">View Transactions</a>
    </section>

    <section class="recent-transactions">
      <h2>Recent Transactions</h2>
      <table id="txnTable">
        <thead>
          <tr><th>Date</th><th>Description</th><th>Amount</th></tr>
        </thead>
        <tbody>
          <!-- rows will be populated dynamically -->
        </tbody>
      </table>
    </section>
  </div>

  <script src="js/dasboard.js">
    window.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const adminLink = document.getElementById('adminLink');
    if(adminLink && user.role === 'admin'){
        adminLink.style.display = 'flex';
    }
});
  </script>
</body>
</html>
