<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot PIN | Horizon Bank</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f7fa;
            font-family: Arial, sans-serif;
        }
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        .bank-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .bank-header h2 {
            color: navy;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .bank-header p {
            color: #64748b;
            font-size: 14px;
        }
        .step-box {
            display: none;
        }
        .step-box.active {
            display: block;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1e293b;
            font-weight: 500;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: navy;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: navy;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1e3a8a;
        }
        .otp-display {
            background: #fff3cd;
            padding: 12px;
            border-radius: 8px;
            color: #856404;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            font-size: 15px;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e2e8f0;
        }
        .step-dot.active {
            background: navy;
        }
        .success-box {
            text-align: center;
        }
        .success-box .tick {
            font-size: 60px;
            margin-bottom: 16px;
        }
        .success-box h3 {
            color: #2ecc71;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .success-box p {
            color: #64748b;
            margin-bottom: 24px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: navy;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .info-text {
            color: #64748b;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="forgot-container">
    <div class="forgot-box">

        <!-- Header -->
        <div class="bank-header">
            <h2>🏦 Horizon Bank</h2>
            <p>Reset your login PIN</p>
        </div>

        <!-- Step indicators -->
        <div class="step-indicator">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-dot" id="dot3"></div>
        </div>

        <!-- Step 1: Enter Phone -->
        <div class="step-box active" id="fpStep1">
            <p class="info-text">Enter your registered phone number to receive OTP</p>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="fpPhone" maxlength="10" 
                       placeholder="Enter 10-digit phone number">
            </div>
            <button class="btn" onclick="sendForgotOTP()">
                Send OTP
            </button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div class="step-box" id="fpStep2">
            <p class="info-text">Enter the OTP sent to your phone number</p>
            <div id="fpOtpDisplay" class="otp-display"></div>
            <div class="input-group">
                <label>Enter OTP</label>
                <input type="text" id="fpOtp" maxlength="6" 
                       placeholder="Enter 6-digit OTP">
            </div>
            <button class="btn" onclick="verifyForgotOTP()">
                Verify OTP
            </button>
            <button class="btn" 
                    id="fpResendBtn" 
                    onclick="resendForgotOTP()" 
                    style="background:white; color:navy; border:1px solid navy; margin-top:8px;">
                Resend OTP
            </button>
        </div>

        <!-- Step 3: Set New PIN -->
        <div class="step-box" id="fpStep3">
            <p class="info-text">Create a new 4-digit PIN for your account</p>
           <div class="input-group">
            <label>New PIN</label>
            <input type="number" id="fpNewPin" 
           maxlength="4"
           min="1000" max="9999"
           oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"
           placeholder="Enter 4-digit PIN">
        </div>
        <div class="input-group">
        <label>Confirm New PIN</label>
        <input type="number" id="fpConfirmPin"
           maxlength="4"
           min="1000" max="9999"
           oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"
           placeholder="Confirm 4-digit PIN">
        </div>
            <button class="btn" onclick="resetPIN()">
                Reset PIN
            </button>
        </div>

        <!-- Success -->
        <div class="step-box" id="fpSuccess">
            <div class="success-box">
                <div class="tick">✅</div>
                <h3>PIN Reset Successfully!</h3>
                <p>Your PIN has been updated. Please login with your new PIN.</p>
                <a href="index.html" class="btn" 
                   style="display:block; text-align:center; text-decoration:none;">
                    Go to Login
                </a>
            </div>
        </div>

        <!-- Back link -->
        <div class="back-link">
            <a href="index.html">← Back to Login</a>
        </div>

    </div>
</div>

<script src="js/forgotPin.js"></script>
</body>
</html>
