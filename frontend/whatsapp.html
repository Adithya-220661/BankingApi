<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Banking Registration</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background:url(css/lastbgofaccount.png);
    background-size:cover;
}

/* ===== MAIN BOX ===== */
.container {
    width: 40%;
    margin-top: 70px;
    margin-left: 600px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
    color:yellow;
    margin-bottom:40px;
    font-size: 38px;
}

/* FORM ROW */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

/* INPUTS */
input, select {
    width:100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid darkgrey;
    align-content: left;
}

/* CAPTCHA */
.captcha-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.captcha-text {
    background: #0A1F44;
    color: white;
    padding: 10px;
    letter-spacing: 3px;
    font-weight: bold;
}

/* BUTTONS */

.btn-group {
    margin-top: 30px;
    display: flex;       
    justify-content: center; 
    gap: 20px;            
}

button {
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

.reset {
    background: lightgray;
}

.submit {
    background:yellow;
    color: black;
}

.submit:hover {
    background:lawngreen;
    color: black;
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
/* Checkbox Group Styling */
.checkbox-group {
    display: flex;
    align-items: center; /* Vertically centers the checkbox with text */
    gap: 10px;
    margin: 15px 0;
    color: white; /* Makes text visible against dark bg */
    font-size: 14px;
}

/* Overriding the global 'input' width for the checkbox specifically */
.checkbox-group input[type="checkbox"] {
    width: 18px; /* Fixed width */
    height: 18px; /* Fixed height */
    cursor: pointer;
    margin: 0; /* Removes default browser margins */
}

.checkbox-group label {
    cursor: pointer;
}

</style>
</head>

<body>

<!-- FORM -->
<div class="container">
    <h2>
        <i class="fa-brands fa-whatsapp" style="color: lime;"></i>
        WhatsApp Banking Registration
    </h2>

    <div class="form-row">
        <select id="accountType">
            <option value="">Select</option>
            <option>Savings</option>
            <option>Current</option>
            <option>Fixed Deposit</option>
        </select>

        <input type="text" id="mobile" placeholder="Registered Mobile Number">
    </div>

    <div class="form-row">
         <div class="captcha-box">
            <span id="captchaText" class="captcha-text"></span>
            <i class="fa-solid fa-rotate" onclick="generateCaptcha()"></i>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha">

       
    </div>
    

    <div class="checkbox-group">
    <input type="checkbox" id="agree">
    <label for="agree">I agree to Terms & Conditions</label>
</div>

    <div class="btn-group">
        <button class="reset" onclick="resetForm()">RESET</button>
        <button class="submit" onclick="sendFakeMessage()">SUBMIT</button>
    </div>
</div>

<!-- TOAST MESSAGE -->
<div id="toastMsg" class="toast">
    ✅ Successfully linked to WhatsApp Netbanking 
</div>

<script>

/* CAPTCHA */
function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let captcha = "";
    for (let i = 0; i < 6; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaText").innerText = captcha;
}
generateCaptcha();

/* RESET */
function resetForm() {
    document.getElementById("mobile").value = "";
    document.getElementById("captchaInput").value = "";
    document.getElementById("agree").checked = false;
    generateCaptcha();
}

/* SUBMIT */
function sendFakeMessage() {

    let account = document.getElementById("accountType").value;
    let mobile = document.getElementById("mobile").value;
    let captchaInput = document.getElementById("captchaInput").value;
    let captchaText = document.getElementById("captchaText").innerText;
    let agree = document.getElementById("agree").checked;

    if (account === "" || mobile === "" || captchaInput === "") {
        alert("Please fill all fields");
        return;
    }

    if (!/^[0-9]{10}$/.test(mobile)) {
        alert("Enter valid mobile number");
        return;
    }

    if (captchaInput !== captchaText) {
        alert("Wrong captcha");
        generateCaptcha();
        return;
    }

    if (!agree) {
        alert("Accept Terms & Conditions");
        return;
    }

    // SHOW TOAST
    let toast = document.getElementById("toastMsg");
    toast.classList.add("show");

    // HIDE TOAST
    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);

    // REDIRECT
    setTimeout(() => {
        window.location.href = "index.html";
    }, 3000);
}

</script>

</body>
</html>
