<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Email Support</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    font-family: 'Segoe UI';
    background:url("css/lastbgofaccount.png");
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-size:cover;

}

/* Card */
.box {
    
    padding: 30px;
    width:400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    margin-top: 40px;
    margin-left:500px ;

     background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(12px);

}

h2 {
    font-size:35px;
    color:yellow;
}

/* Inputs */
input {
    width:100px;
    padding: 10px;
   margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid black;
    font-size: 15px;
}

/* Buttons */
.buttons {
    
    margin-top: 30px;
    display: flex;       
    justify-content: center; 
    gap: 20px;  
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.submit-btn {
    background:turquoise;
    color: black;
}

.reset-btn {
    background: #ccc;
}


/* Toast */
.toast {
    position: fixed;
    top: 20px;
    right: -300px;
    background: #28a745;
    color: white;
    padding: 15px;
    border-radius: 8px;
    transition: 0.5s;
}
.toast.show {
    right: 20px;
}

/* FORM ROW */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid darkgrey;
    justify-items: left;
    align-items: flex-start;
}

/* CAPTCHA */
.captcha-box {
    display: flex;
    
    gap: 10px;

    
   
}

.captcha-text {
    background: #0A1F44;
    color: white;
    padding: 10px;
    letter-spacing: 3px;
    font-weight: bold;
    height: max-content;
}

/* Checkbox Group Styling */
.checkbox-group {
    display: flex;
    align-items: center; /* Vertically centers the checkbox with text */
    gap: 10px;
    margin: 15px 0;
    color: white; /* Makes text visible against dark bg */
    font-size: 14px;
}

/* Overriding the global 'input' width for the checkbox specifically */
.checkbox-group input[type="checkbox"] {
    width: 18px; /* Fixed width */
    height: 18px; /* Fixed height */
    cursor: pointer;
    margin: 0; /* Removes default browser margins */
}

.checkbox-group label {
    cursor: pointer;
}

</style>
</head>

<body>

<div class="box">
    <h2>📧Email Support</h2>

    <form id="form">
        <input type="text" name="name" placeholder="Enter Name" required>
        <input type="email" name="email" placeholder="Enter Email" required>

        
    <div class="form-row">
         <div class="captcha-box">
            <span id="captchaText" class="captcha-text"></span>
            <i class="fa-solid fa-rotate" onclick="generateCaptcha()"></i>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter Captcha">

       
    </div>

    <div class="checkbox-group">
    <input type="checkbox" id="agree">
    <label for="agree">I agree to Terms & Conditions</label>
</div>
        <div class="buttons">
            <button type="reset" class="reset-btn">Reset</button>
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>
</div>

<div class="toast" id="toast">✅ Email Linked Successfully!</div>

<script>

// EmailJS Init
(function(){
    emailjs.init("llzY6hEvavo54-a0A");
})();


/* CAPTCHA */
function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let captcha = "";
    for (let i = 0; i < 4; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captchaText").innerText = captcha;
}
generateCaptcha();

    // Send Email
    emailjs.sendForm("service_tigkgve", "template_37y02km", this)
    .then(() => {
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2000);

        form.reset();
    })
    .catch(() => {
        alert("❌ Failed to send email");
    });

</script>

</body>
</html>
